<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Location | PerPet</title>
<link rel="stylesheet" href="style.css?v=map1">
<style>
.map-wrapper{max-width:1000px;margin:40px auto;padding:20px}.map-card{background:#fff;padding:25px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}#mapFrame{width:100%;height:500px;border:none;border-radius:20px;margin-top:20px}.distance-box{font-size:22px;font-weight:700;margin-top:15px}
</style>
</head>
<body>
<header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><span>PerPet</span></a></div></header>
<div class="map-wrapper">
<div class="map-card">
<h1 id="mapTitle">Pet Location</h1>
<p>The map below shows the pet location and the distance from you.</p>
<div class="distance-box" id="distanceText">Calculating distance...</div>
<iframe id="mapFrame" loading="lazy"></iframe>
</div>
</div>
<script>
const pet=JSON.parse(localStorage.getItem('selectedPet')||'null');
if(!pet){window.location.href='find-pet.html';}
const mapFrame=document.getElementById('mapFrame');
const distanceText=document.getElementById('distanceText');
function calcDistance(lat1, lon1, lat2, lon2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
if(pet && pet.lat && pet.lng){mapFrame.src=`https://maps.google.com/maps?q=${pet.lat},${pet.lng}&z=13&output=embed`;navigator.geolocation.getCurrentPosition(pos=>{const distance=calcDistance(pos.coords.latitude,pos.coords.longitude,pet.lat,pet.lng);distanceText.textContent=`${distance.toFixed(1)} km away from your current location`;},()=>{distanceText.textContent='Could not access your current location';});}else{distanceText.textContent='Pet location unavailable';}
</script>
</body>
</html>
