<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Details | PerPet</title>
<link rel="stylesheet" href="style.css?v=details1">
<style>
.details-container{max-width:1100px;margin:40px auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}.details-image{width:100%;height:500px;background-size:cover;background-position:center;border-radius:24px}.details-card{background:#fff;padding:30px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}.details-card h1{font-size:42px;margin-bottom:10px}.detail-item{margin:15px 0;font-size:18px}.detail-item strong{display:block;margin-bottom:5px}.confirm-btn{margin-top:25px;width:100%}@media(max-width:768px){.details-container{grid-template-columns:1fr}.details-image{height:320px}}
</style>
</head>
<body>
<header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><span>PerPet</span></a></div></header>
<div class="details-container">
<div class="details-image" id="petImage"></div>
<div class="details-card">
<h1 id="petName"></h1>
<div class="detail-item"><strong>Type</strong><span id="petType"></span></div>
<div class="detail-item"><strong>Age</strong><span id="petAge"></span></div>
<div class="detail-item"><strong>Description</strong><span id="petDescription"></span></div>
<div class="detail-item"><strong>Location</strong><span id="petLocation"></span></div>
<button class="btn btn-dark confirm-btn" id="confirmAdoptBtn">Confirm Adoption</button>
</div>
</div>
<script>
const pet=JSON.parse(localStorage.getItem('selectedPet')||'null');
if(!pet){window.location.href='find-pet.html';}
else{
document.getElementById('petImage').style.backgroundImage=`url('${pet.image}')`;
document.getElementById('petName').textContent=pet.name;
document.getElementById('petType').textContent=pet.type;
document.getElementById('petAge').textContent=`${pet.age} year(s)`;
document.getElementById('petDescription').textContent=pet.description;
document.getElementById('petLocation').textContent=[pet.area,pet.city].filter(Boolean).join(', ') || 'Location unavailable';
document.getElementById('confirmAdoptBtn').onclick=()=>{window.location.href='adopt-map.html';};
}
</script>
</body>
</html>
