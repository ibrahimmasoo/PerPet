<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerPet | Create Account</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <a class="back-home" href="index.html">← Back to home</a>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-panel">
        <div class="auth-brand"><span class="brand-mark"></span> PerPet</div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Join PerPet and start finding your perfect companion.</p>

        <form class="auth-form" id="signUpForm">
          <div class="form-row">
            <div class="field">
              <label for="firstName">First name</label>
              <input id="firstName" type="text" placeholder="First name" required>
            </div>
            <div class="field">
              <label for="lastName">Last name</label>
              <input id="lastName" type="text" placeholder="Last name" required>
            </div>
          </div>

          <div class="field">
            <label for="signUpEmail">Email address</label>
            <input id="signUpEmail" type="email" placeholder="name@example.com" required>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="signUpPassword">Password</label>
              <input id="signUpPassword" type="password" placeholder="At least 6 characters" required>
            </div>
            <div class="field">
              <label for="confirmPassword">Confirm password</label>
              <input id="confirmPassword" type="password" placeholder="Confirm your password" required>
            </div>
          </div>

          <div id="authMessage" class="auth-message"></div>

          <button class="btn-auth btn-primary" type="submit">Create account</button>
          <button class="btn-auth btn-google" type="button" id="googleSignInBtn"><span class="google-g">G</span> Continue with Google</button>
        </form>

        <p class="auth-bottom">Already have an account? <a class="link" href="signin.html">Sign in</a></p>
      </div>

      <div class="auth-visual" aria-hidden="true">
        <div class="visual-wrap">
          <div class="visual-lines"></div>
          <div class="visual-monitor"></div>
          <div class="visual-screen"></div>
          <div class="visual-hair"></div>
          <div class="visual-person-head"></div>
          <div class="visual-body"></div>
          <div class="visual-ok">✓</div>
          <div class="visual-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
</body>
</html>
